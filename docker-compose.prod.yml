services:
  db:
    image: postgres:16
    container_name: peaje_db_prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peaje_backend_prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env.prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      - db

volumes:
  postgres_data_prod:
  static_volume:
  media_volume: